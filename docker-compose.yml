services:
  postgres:
    image: postgres:16-alpine
    container_name: agentic-postgres
    environment:
      POSTGRES_DB: agentic
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentic_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: agentic-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT: ":8080"
      DATABASE_URL: postgres://agentic:${DB_PASSWORD:-agentic_password}@postgres:5432/agentic?sslmode=disable
      BASE_RPC_URL: ${BASE_RPC_URL}
      ESCROW_CONTRACT: ${ESCROW_CONTRACT}
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY}
      USDC_CONTRACT: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
      FEE_TREASURY: ${FEE_TREASURY}
      BOND_OPS_WALLET: ${BOND_OPS_WALLET}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: artifacts
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      JWT_SECRET: ${JWT_SECRET}
      CHAIN_ID: "8453"
      PLATFORM_FEE_BPS: "500"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentic-frontend
    depends_on:
      - api
    ports:
      - "3010:80"
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
